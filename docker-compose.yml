services:
  backend:
    build: ./backend
    volumes:
      - ./datasets/jxie-flickr8k/data:/data/parquet:ro
      - explorer-data:/app/data
    environment:
      PARQUET_DIR: /data/parquet
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  explorer-data:
