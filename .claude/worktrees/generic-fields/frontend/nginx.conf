server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service (container name from docker-compose).
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
