services:
  # One-off ingestion (docker compose run --rm init-db). The backend also
  # ingests on boot, so this is optional; the "tools" profile keeps it out of
  # a plain `docker compose up`.
  init-db:
    build: ./backend
    profiles: ["tools"]
    command: python -m app.ingest
    volumes:
      - ./data:/data/datasets:ro
      - ./fields.json:/app/fields.json:ro
      - db-data:/data/db

  backend:
    build: ./backend
    volumes:
      - ./data:/data/datasets:ro
      - ./fields.json:/app/fields.json:ro
      - db-data:/data/db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db-data:
